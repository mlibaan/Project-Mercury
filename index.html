/* Renders page 1 of a PDF file to a canvas, for both preview and OCR input. */
async function pdfFirstPageToCanvas(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const page = await pdf.getPage(1);
  const viewport = page.getViewport({ scale: 2 });
  const canvas = document.createElement("canvas");
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
  return canvas;
}
/* For born-digital PDFs (i.e. not a scanned image), pulls the embedded text
   layer directly and reconstructs it into visual reading-order lines by
   grouping text runs with the same y-position. Far more reliable than OCR
   when the PDF actually has real text in it. */
async function pdfFirstPageTextLines(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const page = await pdf.getPage(1);
  const content = await page.getTextContent();
  const runs = content.items.filter(it => it.str && it.str.trim());
  runs.sort((a, b) => (b.transform[5] - a.transform[5]) || (a.transform[4] - b.transform[4]));
  const lines = [];
  let currentY = null, current = [];
  const TOL = 3;
  for (const run of runs) {
    const y = run.transform[5];
    if (currentY === null || Math.abs(y - currentY) > TOL) {
      if (current.length) lines.push(current.map(w => w.str).join(" "));
      current = [run]; currentY = y;
    } else {
      current.push(run);
    }
  }
  if (current.length) lines.push(current.map(w => w.str).join(" "));
  return lines;
}
function readAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const STATUS_TO_APP = { Pending: "scheduled", Completed: "completed", Missed: "missed" };
function statusToSheet(status) {
  if (status === "completed") return "Completed";
  if (status === "missed") return "Missed";
  return "Pending";
}
function bookingFromSheetRow(r) {
  return {
    id: String(r.row), shop: r.shop, vehicle: r.pickup, invoice: r.invoice || "",
    items: Array.isArray(r.items) ? r.items : [],
    date: r.date, time: r.time, location: r.location,
    status: STATUS_TO_APP[r.status] || "scheduled",
    bookedBy: r.bookedBy || "", confirmedBy: r.confirmedBy || "",
  };
}

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
// A booking counts as "due for confirmation" once 45 minutes have passed its
// scheduled time and no one has confirmed it yet — computed live rather than
// stored, so it doesn't depend on anyone writing a status change at the right moment.
function effectiveStatus(b, now) {
  if (b.status !== "scheduled") return b.status;
  const scheduled = new Date(`${b.date}T${b.time}:00`);
  if (isNaN(scheduled.getTime())) return b.status;
  return now.getTime() - scheduled.getTime() > 45 * 60 * 1000 ? "due" : "scheduled";
}

const toMin = (t) => { const [h, m] = t.split(":").map(Number); return h * 60 + m; };
function timesConflict(t1, t2, bufferMin = 60) {
  return Math.abs(toMin(t1) - toMin(t2)) < bufferMin;
}
// Shop operating hours — deliveries can only be booked in these windows.
const OPERATING_WINDOWS = [["09:00", "12:00"], ["13:30", "18:00"]];
function isWithinOperatingHours(time) {
  const t = toMin(time);
  return OPERATING_WINDOWS.some(([start, end]) => t >= toMin(start) && t <= toMin(end));
}
function suggestSlots(date, vehicle, bookings) {
  const taken = bookings.filter(b => b.vehicle === vehicle && b.date === date && b.status !== "completed").map(b => b.time);
  const out = [];
  for (const [start, end] of OPERATING_WINDOWS) {
    for (let t = toMin(start); t <= toMin(end) && out.length < 3; t += 30) {
      const time = `${String(Math.floor(t / 60)).padStart(2, "0")}:${String(t % 60).padStart(2, "0")}`;
      if (!taken.some(existing => timesConflict(existing, time))) out.push(time);
    }
    if (out.length >= 3) break;
  }
  return out;
}

// Internal dates stay ISO (yyyy-mm-dd) for sorting/comparison; these convert
// to/from the dd/mm/yyyy format used on screen and in the date field.
function isoToDMY(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
}
function dmyToIso(dmy) {
  const m = (dmy || "").match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!m) return null;
  const [, d, mo, y] = m;
  const dd = +d, mm = +mo;
  if (dd < 1 || dd > 31 || mm < 1 || mm > 12) return null;
  return `${y}-${String(mm).padStart(2, "0")}-${String(dd).padStart(2, "0")}`;
}

/* Pull the bill number + item table out of note text (either a PDF's embedded
   text, or raw OCR output — both arrive here as one string with line breaks).
   Not bulletproof — the confirm step always lets the manager fix it. */
function parseNoteText(text) {
  const lines = text.split(/\r?\n/).map(l => l.replace(/\s+/g, " ").trim()).filter(Boolean);

  // Bill number — prefer a line that actually says "Bill Number", fall back to
  // any standalone <prefix>/<digits> pattern in the text.
  let invoice = "";
  const billLine = lines.find(l => /bill\s*number/i.test(l));
  if (billLine) {
    const m = billLine.match(/(\d{1,3}\/\d{3,7})/);
    if (m) invoice = m[1];
  }
  if (!invoice) {
    const m2 = text.match(/\b(\d{1,3}\/\d{3,7})\b/);
    if (m2) invoice = m2[1];
  }

  // Item table: rows look like "<name...> <code> <unit> <qty>", sometimes with
  // the name wrapped onto the line(s) above instead of inline. The unit is only
  // used here to help spot the row — it isn't kept in the output.
  const rowRegex = /^(.*?)\s*(\d{4,6})\s+(pcs\.?|nos\.?|units?|sheets?|box(?:es)?|bags?|rolls?|kg|m|lengths?)\s+(\d+(?:\.\d+)?)\s*$/i;
  const items = [];
  let buffer = [];
  let inTable = false;
  for (const l of lines) {
    if (!inTable) {
      if (/product/i.test(l) && /code/i.test(l) && /quantity/i.test(l)) inTable = true;
      continue;
    }
    if (/goods delivered/i.test(l) || /signature/i.test(l) || /bill\s*number/i.test(l) || /page \d+ of/i.test(l)) break;
    const m = l.match(rowRegex);
    if (m) {
      const inlineName = m[1].trim();
      const code = m[2], qty = m[4];
      const name = inlineName || buffer.join(" ").trim();
      if (name) items.push({ sku: code, product: name, qty });
      buffer = [];
    } else {
      buffer.push(l);
    }
  }

  if (!items.length) {
    // No clean table found (free-form note) — fall back to a best-guess line.
    const candidates = lines.filter(l =>
      !(invoice && l.includes(invoice)) && l.length > 4 &&
      !/bill\s*number|bill\s*date|tin:|tax no|mobile:/i.test(l)
    );
    const guess = candidates.sort((a, b) => b.length - a.length)[0];
    if (guess) items.push({ sku: "", product: guess, qty: "" });
  }

  const shop = invoice ? (PREFIX_MAP[invoice.split("/")[0]] || "ATL") : "ATL";
  return { invoice, items, shop };
}

/* Text input for dd/mm/yyyy entry. Keeps its own draft text while typing so
   partial input isn't clobbered, and only reports a value up (as ISO) once
   the text fully parses as a real date. */
function DateField({ value, onChange, className, style }) {
  const [text, setText] = useState(isoToDMY(value));
  useEffect(() => { setText(isoToDMY(value)); }, [value]);
  return (
    <input
      value={text}
      placeholder="dd/mm/yyyy"
      inputMode="numeric"
      onChange={e => {
        const v = e.target.value;
        setText(v);
        const iso = dmyToIso(v);
        if (iso) onChange(iso);
      }}
      className={className}
      style={style}
    />
  );
}

function SectionHeader({ n, title }) {
  return (
    <div className="flex items-center gap-3 px-5 py-3 bg-gradient-to-b from-[#FAF8F1] to-white border-b border-[#EFEAD9]">

      <span className="text-sm font-semibold text-stone-800" style={FONT_SERIF}>{title}</span>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("board");
  const [bookings, setBookings] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [syncError, setSyncError] = useState(null);
  const [now, setNow] = useState(() => new Date());
  const [settings, setSettings] = useState({ apiUrl: "" });
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [apiUrlDraft, setApiUrlDraft] = useState("");
  const apiUrlRef = React.useRef("");
  const [session, setSession] = useState(null); // { name, role, shop, token }
  const sessionRef = React.useRef(null);
  const [loginName, setLoginName] = useState("");
  const [loginPin, setLoginPin] = useState("");
  const [loginError, setLoginError] = useState(null);
  const [loggingIn, setLoggingIn] = useState(false);
  const [shopFilter, setShopFilter] = useState("ALL");
  const [wizardOpen, setWizardOpen] = useState(false);
  const [step, setStep] = useState(1);
  const [uploading, setUploading] = useState(false);
  const [draft, setDraft] = useState(null);
  const [conflict, setConflict] = useState(null);
  const [rescheduleId, setRescheduleId] = useState(null);
  const [preview, setPreview] = useState(null);
  const [scanProgress, setScanProgress] = useState(0);
  const [scanStage, setScanStage] = useState("reading"); // "reading" | "ocr"
  const [scanError, setScanError] = useState(null);
  const [dragActive, setDragActive] = useState(false);
  const fileInputRef = React.useRef(null);
  // Both roles can book/confirm now — Office accounts are executive
  // management, not just observers. "Role" is kept for identification/
  // display (who's who on bookings) rather than as a permission gate.
  const canAct = !!session;
  const isSuperAdmin = !!(session && session.shop && session.shop.trim().toLowerCase() === "superadmin");
  // Editing an EXISTING delivery is more restricted: only whoever booked it,
  // or a super admin, can change its details.
  function canEditBooking(b) {
    return !!session && (isSuperAdmin || b.bookedBy === session.name);
  }

  // The Google Sheet is the live database — every load re-fetches it fresh.
  async function refreshBookings() {
    const url = apiUrlRef.current;
    const token = sessionRef.current && sessionRef.current.token;
    if (!url || !token) { setLoaded(true); return []; }
    try {
      const res = await fetch(url + "?token=" + encodeURIComponent(token));
      const data = await res.json();
      if (!data.ok) {
        if (data.error === "unauthorized") { clearSession(); return []; }
        throw new Error(data.message || "error");
      }
      const list = (data.bookings || []).map(bookingFromSheetRow);
      setBookings(list);
      setSyncError(null);
      return list;
    } catch (e) {
      setSyncError("Couldn't reach the Google Sheet — check the connection URL and your internet connection.");
      return bookings;
    } finally {
      setLoaded(true);
    }
  }
  async function apiPost(payload) {
    const url = apiUrlRef.current;
    if (!url) return { ok: false, error: "not_connected", message: "Connect a Google Sheet first." };
    const token = sessionRef.current && sessionRef.current.token;
    try {
      const res = await fetch(url, { method: "POST", body: JSON.stringify({ ...payload, token }) });
      const result = await res.json();
      if (!result.ok && result.error === "unauthorized") clearSession();
      return result;
    } catch (e) {
      return { ok: false, error: "network", message: "Couldn't reach the Google Sheet — check your connection." };
    }
  }
  function clearSession() {
    setSession(null);
    sessionRef.current = null;
    localStorage.removeItem("hakatha_session");
    setBookings([]);
  }
  async function login() {
    setLoginError(null);
    if (!loginName || !loginPin) { setLoginError("Pick your name and enter your PIN."); return; }
    setLoggingIn(true);
    const result = await apiPost({ action: "login", name: loginName, pin: loginPin });
    setLoggingIn(false);
    if (!result.ok) { setLoginError(result.message || "Couldn't sign in."); return; }
    const next = { name: result.name, role: result.role, shop: result.shop, token: result.token };
    setSession(next);
    sessionRef.current = next;
    localStorage.setItem("hakatha_session", JSON.stringify(next));
    setLoginPin("");
  }
  async function logout() {
    await apiPost({ action: "logout" });
    clearSession();
  }
  useEffect(() => {
    let apiUrl = "";
    try {
      const raw = localStorage.getItem("hakatha_settings");
      if (raw) { const s = JSON.parse(raw); apiUrl = s.apiUrl || ""; }
    } catch (e) { /* no settings saved yet */ }
    if (!apiUrl) apiUrl = DEFAULT_API_URL;
    setSettings({ apiUrl });
    setApiUrlDraft(apiUrl);
    apiUrlRef.current = apiUrl;

    let existingSession = null;
    try {
      const rawSession = localStorage.getItem("hakatha_session");
      if (rawSession) existingSession = JSON.parse(rawSession);
    } catch (e) { /* not signed in */ }
    if (existingSession) { setSession(existingSession); sessionRef.current = existingSession; }

    if (apiUrl && existingSession) refreshBookings();
    else setLoaded(true);

    const poll = setInterval(refreshBookings, 20000);
    const clock = setInterval(() => setNow(new Date()), 60000);
    return () => { clearInterval(poll); clearInterval(clock); };
  }, []);
  function saveSettings(next) {
    setSettings(next);
    apiUrlRef.current = next.apiUrl || "";
    localStorage.setItem("hakatha_settings", JSON.stringify(next));
    refreshBookings();
  }

  const grouped = useMemo(() => {
    const list = bookings
      .filter(b => /^\d{4}-\d{2}-\d{2}$/.test(b.date)) // guards against stray/malformed rows in the Sheet
      .filter(b => shopFilter === "ALL" || b.shop === shopFilter)
      .filter(b => b.status !== "completed")
      .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
    const byDate = {};
    list.forEach(b => { (byDate[b.date] ||= []).push(b); });
    return byDate;
  }, [bookings, shopFilter]);

  const archived = bookings.filter(b => b.status === "completed" && /^\d{4}-\d{2}-\d{2}$/.test(b.date));

  function openWizard() {
    setDraft(null); setConflict(null); setRescheduleId(null); setStep(1); setWizardOpen(true);
    setPreview(null); setScanError(null); setScanProgress(0);
  }
  function manualEntry() {
    setUploading(false);
    setPreview(null);
    setScanError(null);
    setDraft({ invoice: "", items: [{ sku: "", product: "", qty: "" }], shop: "ATL", vehicle: "ISUZU", date: todayISO(), time: "", location: "" });
    setStep(2);
  }
  function updateItem(idx, field, value) {
    setDraft(d => ({ ...d, items: d.items.map((it, i) => (i === idx ? { ...it, [field]: value } : it)) }));
  }
  function addItemRow() {
    setDraft(d => ({ ...d, items: [...d.items, { sku: "", product: "", qty: "" }] }));
  }
  function removeItemRow(idx) {
    setDraft(d => ({ ...d, items: d.items.filter((_, i) => i !== idx) }));
  }
  async function handleFile(file) {
    if (!file) return;
    const isImage = file.type.startsWith("image/");
    const isPdf = file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf");
    if (!isImage && !isPdf) {
      setScanError("That file type isn't supported. Try a photo, screenshot, or PDF of the delivery note.");
      return;
    }
    setScanError(null);
    setUploading(true);
    setScanProgress(0);
    setScanStage("reading");

    const finishWithParsed = (parsed) => {
      setDraft({
        invoice: parsed.invoice,
        items: parsed.items.length ? parsed.items : [{ sku: "", product: "", qty: "" }],
        shop: parsed.shop,
        vehicle: parsed.shop === "KSJ" ? "BONGO" : "ISUZU",
        date: todayISO(), time: "", location: "",
      });
      if (!parsed.invoice && !parsed.items.length) {
        setScanError("Couldn't pick out the invoice or items automatically — check and fill in the fields below.");
      }
      setUploading(false);
      setStep(2);
    };
    const runOcr = async (ocrInput) => {
      setScanStage("ocr");
      const { data } = await Tesseract.recognize(ocrInput, "eng", {
        logger: (m) => { if (m.status === "recognizing text") setScanProgress(Math.round(m.progress * 100)); },
      });
      finishWithParsed(parseNoteText(data.text || ""));
    };

    try {
      if (isPdf) {
        const [lines, canvas] = await Promise.all([pdfFirstPageTextLines(file), pdfFirstPageToCanvas(file)]);
        setPreview(canvas.toDataURL("image/png"));
        const textLen = lines.join(" ").trim().length;
        if (textLen > 30) {
          // Born-digital PDF with a real text layer — read it directly, no OCR needed.
          finishWithParsed(parseNoteText(lines.join("\n")));
        } else {
          // No usable text layer (a scanned image saved as PDF) — fall back to OCR.
          await runOcr(canvas);
        }
      } else {
        setPreview(await readAsDataURL(file));
        await runOcr(file);
      }
    } catch (e) {
      setUploading(false);
      setScanError(isPdf ? "Couldn't read that PDF. Try a clearer scan, or a photo instead." : "The scan failed to run. Enter the details manually below.");
      setDraft({ invoice: "", items: [{ sku: "", product: "", qty: "" }], shop: "ATL", vehicle: "ISUZU", date: todayISO(), time: "", location: "" });
      setStep(2);
    }
  }
  function onDrop(e) {
    e.preventDefault(); setDragActive(false);
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    handleFile(file);
  }
  function goSchedule() { setConflict(null); setStep(3); }
  async function tryBook() {
    if (!draft.time || !draft.location) return;
    if (!isWithinOperatingHours(draft.time)) {
      setConflict({
        reason: "Deliveries can only be scheduled 09:00–12:00 or 13:30–18:00.",
        suggestions: suggestSlots(draft.date, draft.vehicle, bookings),
      });
      return;
    }
    if (!settings.apiUrl) { setSyncError("Connect a Google Sheet first."); return; }
    const result = await apiPost({
      action: rescheduleId ? "update" : "create",
      row: rescheduleId || undefined,
      date: draft.date, shop: draft.shop, pickup: draft.vehicle,
      time: draft.time, location: draft.location,
      invoice: draft.invoice, items: draft.items,
    });
    // The Sheet itself checks for conflicts inside a lock, so this is the
    // real, race-free source of truth — not just a narrowed client-side check.
    if (!result.ok) {
      if (result.error === "conflict") {
        setConflict({ reason: result.message, suggestions: suggestSlots(draft.date, draft.vehicle, bookings) });
      } else {
        setSyncError(result.message || "Couldn't save the booking — try again.");
      }
      return;
    }
    await refreshBookings();
    setStep(4);
  }
  function closeWizard() { setWizardOpen(false); }
  async function confirmDelivered(id) {
    const result = await apiPost({ action: "updateStatus", row: Number(id), status: "Completed" });
    if (result.ok) await refreshBookings();
    else setSyncError(result.message || "Couldn't update that delivery — try again.");
  }
  async function confirmMissed(id) {
    const result = await apiPost({ action: "updateStatus", row: Number(id), status: "Missed" });
    if (result.ok) await refreshBookings();
    else setSyncError(result.message || "Couldn't update that delivery — try again.");
  }
  function startEdit(b) {
    setDraft({ invoice: b.invoice, items: b.items.map(it => ({ ...it })), shop: b.shop, vehicle: b.vehicle, date: b.date, time: b.time, location: b.location });
    setRescheduleId(b.id); setConflict(null); setStep(2); setWizardOpen(true);
  }

  return (
    <div className="min-h-screen bg-[#F6F3EA] flex flex-col" style={FONT_BODY}>
      {/* Header - white, centered logo, like the PMS reference */}
      <div className="bg-white border-b border-[#EFEAD9]">
        <div className="max-w-5xl mx-auto px-4 pt-8 pb-6 flex flex-col items-center">
          <img src={LOGO_SRC} alt="Hakatha Maldives" className="h-20 mb-4" />
          <div className="text-4xl font-bold text-[#126b39]" style={FONT_SERIF}>Delivery Schedule</div>
        </div>
      </div>

      {/* Toolbar - green, like the reference's control bar */}
      <div className="bg-[#126b39]">
        <div className="max-w-5xl mx-auto px-4 py-3 flex flex-wrap items-center gap-3">
          <div className="flex gap-1.5 flex-wrap">
            {["ALL", "ATL", "KSJ", "HKT3"].map(s => (
              <button key={s} onClick={() => setShopFilter(s)}
                className={`px-3 py-1.5 rounded text-xs font-semibold ${shopFilter === s ? "bg-white text-[#126b39]" : "bg-white/10 text-white hover:bg-white/20"}`}>
                {s === "ALL" ? "All shops" : s}
              </button>
            ))}
          </div>
          <div className="flex gap-1.5 ml-0 sm:ml-2">
            <button onClick={() => setTab("board")} className={`flex items-center gap-1.5 px-3 py-1.5 rounded text-xs font-semibold ${tab === "board" ? "bg-white text-[#126b39]" : "bg-white/10 text-white hover:bg-white/20"}`}>
              <LayoutGrid size={13} /> Board
            </button>
            <button onClick={() => setTab("archive")} className={`flex items-center gap-1.5 px-3 py-1.5 rounded text-xs font-semibold ${tab === "archive" ? "bg-white text-[#126b39]" : "bg-white/10 text-white hover:bg-white/20"}`}>
              <ArchiveIcon size={13} /> Archive
            </button>
          </div>
          <button onClick={() => setSettingsOpen(o => !o)} className="flex items-center gap-1.5 px-3 py-1.5 rounded text-xs font-semibold bg-white/10 text-white hover:bg-white/20">
            <span className="w-1.5 h-1.5 rounded-full" style={{ background: settings.apiUrl ? "#7CFC9A" : "#E4B34A" }} />
            {settings.apiUrl ? "Sheet connected" : "Connect sheet"}
          </button>
          {session && (
            <div className="ml-auto flex items-center gap-2">
              <span className="text-xs text-white/80">{session.name} · {session.role}</span>
              {canAct && (
                <button onClick={openWizard} className="flex items-center gap-1.5 bg-[#f6f3ea] text-[#126b39] font-bold text-sm px-3 py-1.5 rounded">
                  <Plus size={16} /> New delivery
                </button>
              )}
              <button onClick={logout} className="text-xs font-semibold text-white/70 hover:text-white px-2">Log out</button>
            </div>
          )}
        </div>
      </div>

      {settingsOpen && (
        <div className="max-w-5xl mx-auto px-4 pt-4">
          <div className="bg-white border border-[#E4DFD1] rounded-md p-4 mb-2">
            <label className="text-xs font-bold text-stone-500 uppercase tracking-wide">Google Apps Script Web App URL</label>
            <div className="flex gap-2 mt-1">
              <input value={apiUrlDraft} onChange={e => setApiUrlDraft(e.target.value)} placeholder="https://script.google.com/macros/s/.../exec"
                className="flex-1 border border-[#D9D2BC] rounded px-3 py-2 text-sm bg-[#FAF8F1]" style={FONT_MONO} />
              <button onClick={() => { saveSettings({ ...settings, apiUrl: apiUrlDraft.trim() }); setSettingsOpen(false); }}
                className="px-3 py-2 rounded text-white text-xs font-semibold" style={{ background: "#126b39" }}>Connect</button>
            </div>
            <div className="text-xs text-stone-400 mt-2">Shared across everyone using this app — set it once. Get this URL by deploying the Apps Script backend as a Web App.</div>
          </div>
        </div>
      )}

      <div className="max-w-5xl mx-auto px-4 py-6 flex-1">
        {syncError && (
          <div className="flex items-center gap-2 text-xs text-amber-800 bg-amber-50 border border-amber-200 rounded p-2.5 mb-4">
            <AlertTriangle size={14} className="shrink-0" /> {syncError}
          </div>
        )}
        {!loaded ? (
          <div className="text-center py-16 text-stone-400 text-sm">Loading…</div>
        ) : !settings.apiUrl ? (
          <div className="text-center py-16 max-w-sm mx-auto">
            <div className="text-base font-bold text-stone-700 mb-1" style={FONT_SERIF}>Connect your Google Sheet</div>
            <div className="text-sm text-stone-500 mb-4">Every delivery lives in your Sheet — connect it to start booking.</div>
            <button onClick={() => setSettingsOpen(true)} className="px-4 py-2 rounded text-white text-sm font-semibold" style={{ background: "#126b39" }}>Connect now</button>
          </div>
        ) : !session ? (
          <div className="max-w-xs mx-auto py-10">
            <div className="text-base font-bold text-stone-700 mb-1 text-center" style={FONT_SERIF}>Sign in</div>
            <div className="text-sm text-stone-500 mb-5 text-center">Enter your name and PIN.</div>
            <div className="bg-white border border-[#E4DFD1] rounded-md p-5 space-y-3">
              <div>
                <label className="text-xs font-bold text-stone-500 uppercase tracking-wide">Name</label>
                <input value={loginName} onChange={e => setLoginName(e.target.value)} placeholder="Your name" className="w-full border border-[#D9D2BC] rounded px-3 py-2 text-sm mt-1 bg-[#FAF8F1]" />
              </div>
              <div>
                <label className="text-xs font-bold text-stone-500 uppercase tracking-wide">PIN</label>
                <input value={loginPin} onChange={e => setLoginPin(e.target.value)} type="password" inputMode="numeric" placeholder="••••"
                  onKeyDown={e => e.key === "Enter" && login()}
                  className="w-full border border-[#D9D2BC] rounded px-3 py-2 text-sm mt-1 bg-[#FAF8F1]" style={FONT_MONO} />
              </div>
              {loginError && <div className="text-xs text-rose-700 bg-rose-50 border border-rose-200 rounded p-2">{loginError}</div>}
              <button onClick={login} disabled={loggingIn} className="w-full text-white text-sm font-semibold rounded py-2.5 disabled:opacity-50" style={{ background: "#126b39" }}>
                {loggingIn ? "Signing in…" : "Sign in"}
              </button>
            </div>
          </div>
        ) : tab === "board" && (
          <>
            {Object.keys(grouped).length === 0 && <div className="text-center py-16 text-stone-400 text-sm">No Pending Deliveries</div>}
            {Object.entries(grouped).map(([date, items]) => (
              <div key={date} className="mb-6">
                <div className="text-base font-bold tracking-wide text-stone-600 mb-2" style={FONT_MONO}>{isoToDMY(date)}</div>
                <div className="space-y-3">
                  {items.map(b => <DeliveryCard key={b.id} b={{ ...b, status: effectiveStatus(b, now) }} canAct={canAct} canEdit={canEditBooking(b)} onConfirmDelivered={confirmDelivered} onConfirmMissed={confirmMissed} onEdit={startEdit} />)}
                </div>
              </div>
            ))}
          </>
        )}

        {loaded && settings.apiUrl && session && tab === "archive" && (
          <div>
            <div className="text-xs text-stone-500 mb-4">Every completed delivery lives in your connected Google Sheet — this is a live view of it.</div>
            {archived.length === 0 ? (
              <div className="text-center py-16 text-stone-400 text-sm">No completed deliveries yet.</div>
            ) : (
              <div className="bg-white border border-[#E4DFD1] rounded-md overflow-hidden">
                <table className="w-full text-sm">
                  <thead className="bg-[#FAF8F1] text-stone-600 text-xs uppercase">
                    <tr><th className="text-left px-3 py-2">Shop</th><th className="text-left px-3 py-2">Invoice</th><th className="text-left px-3 py-2">Items</th><th className="text-left px-3 py-2">Vehicle</th><th className="text-left px-3 py-2">Date</th><th className="text-left px-3 py-2">Location</th><th className="text-left px-3 py-2">Confirmed by</th></tr>
                  </thead>
                  <tbody>
                    {archived.map(b => (
                      <tr key={b.id} className="border-t border-[#EFEAD9]">
                        <td className="px-3 py-2"><ShopChip shop={b.shop} /></td>
                        <td className="px-3 py-2" style={FONT_MONO}>{b.invoice}</td>
                        <td className="px-3 py-2">{(b.items || []).map(it => `${it.product}${it.qty ? ` ×${it.qty}` : ""}`).join("; ")}</td>
                        <td className="px-3 py-2">{b.vehicle}</td>
                        <td className="px-3 py-2">{isoToDMY(b.date)}</td>
                        <td className="px-3 py-2">{b.location}</td>
                        <td className="px-3 py-2">{b.confirmedBy || "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}
      </div>

      <div className="max-w-5xl mx-auto px-4 pb-4 text-xs text-stone-400" style={FONT_MONO}>Project Mercury 1.0</div>

      {/* Wizard modal - numbered-card style matching the reference */}
      {wizardOpen && (
        <div className="fixed inset-0 bg-stone-900/50 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-lg w-full max-w-lg overflow-hidden relative">
            <button onClick={closeWizard} className="absolute top-4 right-4 text-stone-400 hover:text-stone-700 z-10"><X size={18} /></button>
            <SectionHeader n={step} title={
              step === 1 ? "Upload delivery note" : step === 2 ? "Confirm details" : step === 3 ? (rescheduleId ? "Edit delivery" : "Schedule delivery") : "Booked"
            } />
            <div className="p-6">

            {step === 1 && (
              <div>
                <input ref={fileInputRef} type="file" accept="image/*,application/pdf" className="hidden"
                  onChange={e => handleFile(e.target.files && e.target.files[0])} />
                <div
                  onClick={() => !uploading && fileInputRef.current && fileInputRef.current.click()}
                  onDragOver={e => { e.preventDefault(); setDragActive(true); }}
                  onDragLeave={() => setDragActive(false)}
                  onDrop={onDrop}
                  className="rounded-md p-8 text-center mb-3 cursor-pointer transition-colors"
                  style={{
                    border: `2px dashed ${dragActive ? "#126b39" : "#D9D2BC"}`,
                    background: dragActive ? "#126b39" + "0D" : "#FAF8F1",
                  }}
                >
                  {uploading ? (
                    <div>
                      {scanStage === "ocr" ? (
                        <>
                          <div className="text-sm text-stone-600 mb-2">Scanning note… {scanProgress}%</div>
                          <div className="w-full h-1.5 bg-stone-200 rounded overflow-hidden mx-auto max-w-xs">
                            <div className="h-full transition-all" style={{ width: `${scanProgress}%`, background: "#126b39" }} />
                          </div>
                        </>
                      ) : (
                        <div className="text-sm text-stone-600">Reading note…</div>
                      )}
                    </div>
                  ) : preview ? (
                    <div className="flex flex-col items-center">
                      <img src={preview} alt="Delivery note preview" className="max-h-32 rounded border border-[#E4DFD1] mb-2" />
                      <div className="text-xs text-stone-500">Click or drop to scan a different note</div>
                    </div>
                  ) : (
                    <>
                      <Upload className="mx-auto mb-2 text-[#126b39]" size={28} />
                      <div className="text-sm text-stone-600 mb-1">Drop a photo or PDF of the delivery note here</div>
                      <div className="text-xs text-stone-400">or click to choose a file — JPG, PNG or PDF</div>
                    </>
                  )}
                </div>
                {scanError && (
                  <div className="flex items-start gap-2 text-xs text-amber-800 bg-amber-50 border border-amber-200 rounded p-2.5 mb-3">
                    <AlertTriangle size={14} className="mt-0.5 shrink-0" /> {scanError}
                  </div>
                )}
                <div className="text-xs text-stone-400 mb-4">PDFs: only page 1 is scanned.</div>
                <div className="flex items-center gap-3 mb-3">
                  <div className="flex-1 h-px bg-[#EFEAD9]" />
                  <span className="text-xs text-stone-400 uppercase tracking-wide font-semibold">or</span>
                  <div className="flex-1 h-px bg-[#EFEAD9]" />
                </div>
                <button onClick={manualEntry} className="w-full flex items-center justify-center gap-1.5 border rounded p-2.5 text-sm font-semibold hover:bg-[#126b39]/5" style={{ borderColor: "#D9D2BC", color: "#126b39" }}>
                  <FileText size={14} /> Manual Entry
                </button>
              </div>
            )}

            {step === 2 && draft && (
              <div className="space-y-3">
                <div>
                  <label className="text-xs font-bold text-stone-500 uppercase tracking-wide">Invoice</label>
                  <input value={draft.invoice} onChange={e => setDraft({ ...draft, invoice: e.target.value })} className="w-full border border-[#D9D2BC] rounded px-3 py-2 text-sm mt-1 bg-[#FAF8F1] focus:outline-none focus:ring-2 focus:ring-[#126b39]/30" style={FONT_MONO} />
                </div>
                <div>
                  <label className="text-xs font-bold text-stone-500 uppercase tracking-wide">Items</label>
                  <div className="grid mt-1 mb-1 gap-2 px-1 text-[10px] font-bold text-stone-400 uppercase tracking-wide" style={{ gridTemplateColumns: "80px 1fr 64px 24px" }}>
                    <div>SKU</div><div>Product</div><div>Qty</div><div></div>
                  </div>
                  <div className="space-y-1.5">
                    {draft.items.map((it, idx) => (
                      <div key={idx} className="grid gap-2 items-center" style={{ gridTemplateColumns: "80px 1fr 64px 24px" }}>
                        <input value={it.sku} onChange={e => updateItem(idx, "sku", e.target.value)} placeholder="—"
                          className="border rounded px-2 py-1.5 text-xs bg-[#FAF8F1] focus:outline-none focus:ring-2 focus:ring-[#126b39]/30" style={{ borderColor: "#D9D2BC", ...FONT_MONO }} />
                        <input value={it.product} onChange={e => updateItem(idx, "product", e.target.value)} placeholder="Product name"
                          className="border rounded px-2 py-1.5 text-sm bg-[#FAF8F1] focus:outline-none focus:ring-2 focus:ring-[#126b39]/30" style={{ borderColor: "#D9D2BC" }} />
                        <input value={it.qty} onChange={e => updateItem(idx, "qty", e.target.value)} placeholder="0"
                          className="border rounded px-2 py-1.5 text-sm bg-[#FAF8F1] focus:outline-none focus:ring-2 focus:ring-[#126b39]/30" style={{ borderColor: "#D9D2BC" }} />
                        <button onClick={() => removeItemRow(idx)} disabled={draft.items.length === 1}
                          className="text-stone-400 hover:text-rose-600 disabled:opacity-30 flex justify-center"><X size={14} /></button>
                      </div>
                    ))}
                  </div>
                  <button onClick={addItemRow} className="mt-2 text-xs font-semibold" style={{ color: "#126b39" }}>+ Add item</button>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-xs font-bold text-stone-500 uppercase tracking-wide">Shop</label>
                    <select value={draft.shop} onChange={e => setDraft({ ...draft, shop: e.target.value })} className="w-full border border-[#D9D2BC] rounded px-3 py-2 text-sm mt-1 bg-[#FAF8F1]">
                      {Object.keys(SHOPS).map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="text-xs font-bold text-stone-500 uppercase tracking-wide">Pickup vehicle</label>
                    <select value={draft.vehicle} onChange={e => setDraft({ ...draft, vehicle: e.target.value })} className="w-full border border-[#D9D2BC] rounded px-3 py-2 text-sm mt-1 bg-[#FAF8F1]">
                      {Object.keys(VEHICLES).map(v => <option key={v} value={v}>{v}</option>)}
                    </select>
                  </div>
                </div>
                <div className="text-xs text-stone-400 italic">Shop and vehicle are guessed from the invoice prefix — check they're right before continuing.</div>
                <button onClick={goSchedule} className="w-full mt-2 bg-[#126b39] hover:bg-[#0e5a2f] text-white text-sm font-semibold rounded py-2.5 flex items-center justify-center gap-1">
                  Looks right, continue <ChevronRight size={15} />
                </button>
              </div>
            )}

            {step === 3 && draft && (
              <div className="space-y-3">
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-xs font-bold text-stone-500 uppercase tracking-wide">Date</label>
                    <DateField value={draft.date} onChange={iso => setDraft({ ...draft, date: iso })} className="w-full border border-[#D9D2BC] rounded px-3 py-2 text-sm mt-1 bg-[#FAF8F1]" />
                  </div>
                  <div>
                    <label className="text-xs font-bold text-stone-500 uppercase tracking-wide">Time</label>
                    <input type="time" value={draft.time} onChange={e => setDraft({ ...draft, time: e.target.value })} className="w-full border border-[#D9D2BC] rounded px-3 py-2 text-sm mt-1 bg-[#FAF8F1]" />
                  </div>
                </div>
                <div className="text-xs text-stone-400 -mt-2">Operating hours: 09:00–12:00 and 13:30–18:00</div>
                <div>
                  <label className="text-xs font-bold text-stone-500 uppercase tracking-wide">Location</label>
                  <input value={draft.location} onChange={e => setDraft({ ...draft, location: e.target.value })} placeholder="e.g. North Harbor" className="w-full border border-[#D9D2BC] rounded px-3 py-2 text-sm mt-1 bg-[#FAF8F1]" />
                </div>
                {conflict && (
                  <div className="bg-rose-50 border border-rose-200 rounded p-3">
                    <div className="flex items-start gap-2 text-rose-800 text-xs font-semibold mb-2"><AlertTriangle size={14} className="mt-0.5 shrink-0" /> Slot not available</div>
                    <div className="text-xs text-rose-700 mb-2">{conflict.reason}</div>
                    <div className="text-xs text-rose-700 mb-1.5">Try one of these instead:</div>
                    <div className="flex gap-2 flex-wrap">
                      {conflict.suggestions.map(s => (
                        <button key={s} onClick={() => { setDraft({ ...draft, time: s }); setConflict(null); }} className="px-2.5 py-1 rounded bg-white border border-rose-300 text-rose-700 text-xs font-semibold hover:bg-rose-100">{s}</button>
                      ))}
                    </div>
                  </div>
                )}
                <button onClick={tryBook} disabled={!draft.time || !draft.location} className="w-full mt-1 bg-[#f6ec31] hover:bg-[#eee02a] disabled:opacity-40 text-[#0e4f2b] text-sm font-bold rounded py-2.5 flex items-center justify-center gap-1.5">
                  <CheckCircle2 size={16} /> Check availability &amp; book
                </button>
              </div>
            )}

            {step === 4 && draft && (
              <div className="text-center py-4">
                <CheckCircle2 className="mx-auto mb-3 text-[#126b39]" size={36} />
                <div className="font-bold text-stone-800 mb-1" style={FONT_SERIF}>Booked</div>
                <div className="text-sm text-stone-500 mb-4">{draft.vehicle} · {draft.date} at {draft.time} · {draft.location}</div>
                <button onClick={closeWizard} className="bg-[#126b39] hover:bg-[#0e5a2f] text-white text-sm font-semibold rounded px-5 py-2.5">Done</button>
              </div>
            )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
