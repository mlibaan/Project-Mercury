/* Renders page 1 of a PDF file to a canvas, for both preview and OCR input. */
async function pdfFirstPageToCanvas(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const page = await pdf.getPage(1);
  const viewport = page.getViewport({ scale: 2 });
  const canvas = document.createElement("canvas");
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
  return canvas;
}
/* For born-digital PDFs (i.e. not a scanned image), pulls the embedded text
   layer directly and reconstructs it into visual reading-order lines by
   grouping text runs with the same y-position. Far more reliable than OCR
   when the PDF actually has real text in it. */
async function pdfFirstPageTextLines(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const page = await pdf.getPage(1);
  const content = await page.getTextContent();
  const runs = content.items.filter(it => it.str && it.str.trim());
  runs.sort((a, b) => (b.transform[5] - a.transform[5]) || (a.transform[4] - b.transform[4]));
  const lines = [];
  let currentY = null, current = [];
  const TOL = 3;
  for (const run of runs) {
    const y = run.transform[5];
    if (currentY === null || Math.abs(y - currentY) > TOL) {
      if (current.length) lines.push(current.map(w => w.str).join(" "));
      current = [run]; currentY = y;
    } else {
      current.push(run);
    }
  }
  if (current.length) lines.push(current.map(w => w.str).join(" "));
  return lines;
}
function readAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const FREE_DELIVERY_THRESHOLDS = {

function normalizeSku(sku) {
  const s = String(sku || "").trim();

// SKUs themselves — those are the fee being waived, not product value, so
// they shouldn't count toward the free-delivery threshold. Items with no
// matching SKU in PRICE_MAP contribute nothing (can't price them).
function computeOrderValue(items) {
  const deliveryChargeSkus = new Set(["01078", "01079", "01080"]);
  let total = 0;
  for (const it of (items || [])) {
    const sku = normalizeSku(it && it.sku);
    if (deliveryChargeSkus.has(sku)) continue;
    const price = PRICE_MAP[sku];
    if (price == null) continue;
    total += price * (parseFloat(it && it.qty) || 0);
  }
  return total;
}
function zoneChargeOk(zone, items) {
  const z = ZONES.find(zn => zn.label === zone);
  if (!z || !z.sku) return true; // "Other" or unknown zone — no charge requirement
  const threshold = FREE_DELIVERY_THRESHOLDS[zone];
  if (threshold != null && computeOrderValue(items) > threshold) return true; // qualifies for free delivery

const toMin = (t) => { const [h, m] = t.split(":").map(Number); return h * 60 + m; };

  return Math.abs(toMin(t1) - toMin(t2)) < bufferMin;
}

const OPERATING_WINDOWS = [["09:00", "12:00"], ["13:30", "18:00"]];
function isWithinOperatingHours(time) {
  const t = toMin(time);
  return OPERATING_WINDOWS.some(([start, end]) => t >= toMin(start) && t <= toMin(end));
}
function suggestSlots(date, vehicle, bookings) {
  const taken = bookings.filter(b => b.vehicle === vehicle && b.date === date && b.status !== "completed").map(b => b.time);
  const out = [];
  for (const [start, end] of OPERATING_WINDOWS) {
    for (let t = toMin(start); t <= toMin(end) && out.length < 3; t += 30) {
      const time = `${String(Math.floor(t / 60)).padStart(2, "0")}:${String(t % 60).padStart(2, "0")}`;
      if (!taken.some(existing => timesConflict(existing, time))) out.push(time);
    }
    if (out.length >= 3) break;
  }
  return out;
}

function dmyToIso(dmy) {
  const m = (dmy || "").match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!m) return null;
  const [, d, mo, y] = m;

/* Pull the bill number + item table out of note text (either a PDF's embedded
   text, or raw OCR output — both arrive here as one string with line breaks).
   Not bulletproof — the confirm step always lets the manager fix it. */
function parseNoteText(text) {
  const lines = text.split(/\r?\n/).map(l => l.replace(/\s+/g, " ").trim()).filter(Boolean);

  // Bill number — prefer a line that actually says "Bill Number", fall back to
  // any standalone <prefix>/<digits> pattern in the text. Recognizes "QT/..."
  // quotation numbers the same way as real invoice numbers.
  let invoice = "";
  const billLine = lines.find(l => /bill\s*number/i.test(l));
  if (billLine) {
    const m = billLine.match(INVOICE_NUMBER_RE);
    if (m) invoice = m[1];
  }
  if (!invoice) {
    const m2 = text.match(INVOICE_NUMBER_RE);
    if (m2) invoice = m2[1];
  }

  // Item table: rows look like "<name...> <code> <unit> <qty>", sometimes with
  // the name wrapped onto the line(s) above instead of inline. The unit is only
  // used here to help spot the row — it isn't kept in the output.
  const rowRegex = /^(.*?)\s*(\d{4,6})\s+(pcs\.?|nos\.?|units?|sheets?|box(?:es)?|bags?|rolls?|kg|m|lengths?)\s+(\d+(?:\.\d+)?)\s*$/i;
  const items = [];
  let buffer = [];
  let inTable = false;
  for (const l of lines) {
    if (!inTable) {
      if (/product/i.test(l) && /code/i.test(l) && /quantity/i.test(l)) inTable = true;
      continue;
    }
    if (/goods delivered/i.test(l) || /signature/i.test(l) || /bill\s*number/i.test(l) || /page \d+ of/i.test(l)) break;
    const m = l.match(rowRegex);
    if (m) {
      const inlineName = m[1].trim();
      const code = m[2], qty = m[4];
      const name = inlineName || buffer.join(" ").trim();
      if (name) items.push({ sku: code, product: name, qty });
      buffer = [];
    } else {
      buffer.push(l);
    }
  }

  if (!items.length) {
    // No clean table found (free-form note) — fall back to a best-guess line.
    const candidates = lines.filter(l =>
      !(invoice && l.includes(invoice)) && l.length > 4 &&
      !/bill\s*number|bill\s*date|tin:|tax no|mobile:/i.test(l)
    );
    const guess = candidates.sort((a, b) => b.length - a.length)[0];
    if (guess) items.push({ sku: "", product: guess, qty: "" });
  }

  const shop = invoice ? (PREFIX_MAP[invoice.split("/")[0]] || "ATL") : "ATL";
  return { invoice, items, shop };
}

/* Pulls the invoice number + item table out of a real Tax Invoice (as opposed
   to a delivery note — parseNoteText above). Used when attaching an invoice
   to a booking that was made off a quotation, so it can be cross-checked
   against what's already on the booking. Looks for:
     - the invoice number next to a "Number:" label (not the payment table's
       unlabelled "Number" column, which has no colon)
     - a table with "Description" / "Code" / "Quantity" column headers
   itemsTableFound distinguishes "no table on this page" from "table found
   but every row was unreadable" — both mean the same thing to the caller
   (flag for review), but it's useful for the error message. */
function parseInvoiceText(text) {
  const lines = text.split(/\r?\n/).map(l => l.replace(/\s+/g, " ").trim()).filter(Boolean);

  let invoice = "";
  const numberLine = lines.find(l => /^number\s*:/i.test(l));
  if (numberLine) {
    const m = numberLine.match(INVOICE_NUMBER_RE);
    if (m) invoice = m[1];
  }
  if (!invoice) {
    const m2 = text.match(INVOICE_NUMBER_RE);
    if (m2) invoice = m2[1];
  }

  const rowRegex = /^(?:\d+\s+)?(.+?)\s+(\d{4,6})\s+(pcs\.?|nos\.?|units?|sheets?|box(?:es)?|bags?|rolls?|kg|m|lengths?)\s+(\d+(?:\.\d+)?)\s+.*$/i;
  const items = [];
  let inTable = false;
  for (const l of lines) {
    if (!inTable) {
      if (/description/i.test(l) && /code/i.test(l) && /quantity/i.test(l)) inTable = true;
      continue;
    }
    if (/sub\s*total|payment:|goods delivered|signature|page \d+ of/i.test(l)) break;
    const m = l.match(rowRegex);
    if (m) items.push({ sku: m[2], product: m[1].trim(), qty: m[4] });
  }

  return { invoice, items, itemsTableFound: inTable };
}

// Compares an already-entered booking's items against what was scanned off
// an invoice — by SKU + quantity, order-independent. Rows without a SKU on
// either side can't be compared, so any of those means "can't confirm this
// matches" rather than a false pass.
function itemsMatch(bookingItems, invoiceItems) {
  const norm = (its) => (its || [])
    .map(it => ({ sku: normalizeSku(it && it.sku), qty: String(parseFloat(it && it.qty) || 0) }))
    .filter(it => it.sku)
    .sort((a, b) => a.sku.localeCompare(b.sku));
  const a = norm(bookingItems), b = norm(invoiceItems);
  if (!a.length || a.length !== b.length) return false;
  return a.every((it, i) => it.sku === b[i].sku && it.qty === b[i].qty);
}

/* Text input for dd/mm/yyyy entry. Keeps its own draft text while typing so
   partial input isn't clobbered, and only reports a value up (as ISO) once
   the text fully parses as a real date. */
function DateField({ value, onChange, className, style }) {
  const [text, setText] = useState(isoToDMY(value));
  useEffect(() => { setText(isoToDMY(value)); }, [value]);
  return (
    <input
      value={text}
      placeholder="dd/mm/yyyy"
      inputMode="numeric"
      onChange={e => {
        const v = e.target.value;
        setText(v);
        const iso = dmyToIso(v);
        if (iso) onChange(iso);
      }}
      className={className}
      style={style}
    />
  );
}

  // Both roles can book/confirm now — Office accounts are executive
  // management, not just observers. "Role" is kept for identification/
  // display (who's who on bookings) rather than as a permission gate.
  const canAct = !!session;
  const isSuperAdmin = !!(session && session.shop && session.shop.trim().toLowerCase() === "superadmin");
  // Editing an EXISTING delivery is more restricted: only whoever booked it,
  // or a super admin, can change its details.
  function canEditBooking(b) {
    return !!session && (isSuperAdmin || b.bookedBy === session.name);
  }

  // The Google Sheet is the live database — every load re-fetches it fresh.
  async function refreshBookings() {
    const url = apiUrlRef.current;
    const token = sessionRef.current && sessionRef.current.token;
    if (!url || !token) { setLoaded(true); return []; }
    try {
      const res = await fetch(url + "?token=" + encodeURIComponent(token));
      const data = await res.json();
      if (!data.ok) {
        if (data.error === "unauthorized") { clearSession(); return []; }
        throw new Error(data.message || "error");
      }
      const list = (data.bookings || []).map(bookingFromSheetRow);
      setBookings(list);
      setSyncError(null);
      return list;
    } catch (e) {
      setSyncError("Couldn't reach the Google Sheet — check the connection URL and your internet connection.");
      return bookings;
    } finally {
      setLoaded(true);
    }
  }
  async function apiPost(payload) {
    const url = apiUrlRef.current;
    if (!url) return { ok: false, error: "not_connected", message: "Connect a Google Sheet first." };
    const token = sessionRef.current && sessionRef.current.token;
    try {
      const res = await fetch(url, { method: "POST", body: JSON.stringify({ ...payload, token }) });
      const result = await res.json();
      if (!result.ok && result.error === "unauthorized") clearSession();
      return result;
    } catch (e) {
      return { ok: false, error: "network", message: "Couldn't reach the Google Sheet — check your connection." };
    }
  }
  async function loadPrices() {
    const url = apiUrlRef.current;
    const token = sessionRef.current && sessionRef.current.token;
    if (!url || !token) return;
    try {
      const res = await fetch(url + "?action=prices&token=" + encodeURIComponent(token));
      const data = await res.json();
      if (data.ok) setPrices(data.prices || []);
    } catch (e) { /* leave list as-is */ }
    setPricesLoaded(true);
  }
  async function addManualPrice() {
    if (!manualSku.trim() || !manualPrice) return;
    setPriceUpload({ error: null, busy: true });
    const result = await apiPost({ action: "upsertPrice", sku: manualSku.trim(), name: manualName.trim(), price: manualPrice });
    setPriceUpload({ error: result.ok ? null : (result.message || "Couldn't save that price."), busy: false });
    if (result.ok) {
      setManualSku(""); setManualName(""); setManualPrice("");
      await loadPrices();
    }
  }
  async function submitChangePin() {
    setChangePinError(null);
    if (!currentPinInput || !newPinInput) { setChangePinError("Fill in both PIN fields."); return; }
    if (newPinInput !== confirmPinInput) { setChangePinError("New PINs don't match."); return; }
    if (newPinInput.length < 4) { setChangePinError("New PIN must be at least 4 characters."); return; }
    setChangePinBusy(true);
    const result = await apiPost({ action: "changePin", currentPin: currentPinInput, newPin: newPinInput });
    setChangePinBusy(false);
    if (!result.ok) { setChangePinError(result.message || "Couldn't change your PIN."); return; }
    setCurrentPinInput(""); setNewPinInput(""); setConfirmPinInput(""); setChangePinOpen(false);
  }
  async function loadUsers() {
    const url = apiUrlRef.current;
    const token = sessionRef.current && sessionRef.current.token;
    if (!url || !token) return;
    try {
      const res = await fetch(url + "?action=users&token=" + encodeURIComponent(token));
      const data = await res.json();
      if (data.ok) setUserList(data.users || []);
      else setUserMgmtError(data.message || "Couldn't load users.");
    } catch (e) { /* leave list as-is */ }
    setUsersLoaded(true);
  }
  async function addUser() {
    if (!newUserName.trim() || newUserPin.length < 4) return;
    setUserMgmtBusy(true); setUserMgmtError(null);
    const result = await apiPost({
      action: "addUser", name: newUserName.trim(), role: newUserRole.trim(),
      shop: newUserAccess === "admin" ? "SuperAdmin" : "", pin: newUserPin,
    });
    setUserMgmtBusy(false);
    if (!result.ok) { setUserMgmtError(result.message || "Couldn't add that user."); return; }
    setNewUserName(""); setNewUserRole(""); setNewUserAccess("user"); setNewUserPin("");
    await loadUsers();
  }
  async function removeUser(name) {
    setUserMgmtBusy(true); setUserMgmtError(null);
    const result = await apiPost({ action: "removeUser", name });
    setUserMgmtBusy(false);
    if (!result.ok) { setUserMgmtError(result.message || "Couldn't remove that user."); return; }
    await loadUsers();
  }
  function clearSession() {
    setSession(null);
    sessionRef.current = null;
    localStorage.removeItem("hakatha_session");
    setBookings([]);
  }
  async function login() {
    setLoginError(null);
    if (!loginName || !loginPin) { setLoginError("Pick your name and enter your PIN."); return; }
    setLoggingIn(true);
    const result = await apiPost({ action: "login", name: loginName, pin: loginPin });
    setLoggingIn(false);
    if (!result.ok) { setLoginError(result.message || "Couldn't sign in."); return; }

    if (!isImage && !isPdf) {
      setScanError("That file type isn't supported. Try a photo, screenshot, or PDF of the delivery note.");
      return;
    }
    setScanError(null);
    setScanFailed(false);
    setLastFile(file);
    setUploading(true);
    setScanProgress(0);
    setScanStage("reading");

    const finishWithParsed = (parsed) => {
      setDraft({
        invoice: parsed.invoice,
        items: parsed.items.length ? parsed.items : [{ sku: "", product: "", qty: "" }],
        shop: parsed.shop,
        vehicle: parsed.shop === "KSJ" ? "BONGO" : "ISUZU",
        date: todayISO(), time: "", location: "", zone: "",
      });
      if (!parsed.invoice && !parsed.items.length) {
        setScanError("Couldn't pick out the invoice or items automatically — check and fill in the fields below.");
      }
      setUploading(false);
      setStep(2);

      setScanStage("ocr");
      const { data } = await Tesseract.recognize(ocrInput, "eng", {
        logger: (m) => { if (m.status === "recognizing text") setScanProgress(Math.round(m.progress * 100)); },
      });
      finishWithParsed(parseNoteText(data.text || ""));
    };

    try {
      if (isPdf) {
        const [lines, canvas] = await Promise.all([pdfFirstPageTextLines(file), pdfFirstPageToCanvas(file)]);
        setPreview(canvas.toDataURL("image/png"));
        const textLen = lines.join(" ").trim().length;
        if (textLen > 30) {
          // Born-digital PDF with a real text layer — read it directly, no OCR needed.
          finishWithParsed(parseNoteText(lines.join("\n")));
        } else {

          await runOcr(canvas);
        }
      } else {
        setPreview(await readAsDataURL(file));
        await runOcr(file);
      }
    } catch (e) {
      // A real failure (not just "found nothing useful") — stay on step 1 and
      // offer to retry the same file, rather than dumping the manager into a
      // blank confirm screen.
      setUploading(false);

    if (!zoneChargeOk(draft.zone, draft.items)) {
      const threshold = FREE_DELIVERY_THRESHOLDS[draft.zone];
      setChargeError(`This order doesn't meet the free-delivery minimum for ${draft.zone}. Orders need to be MVR ${threshold != null ? threshold.toLocaleString() : "0"}+ — this one's MVR ${computeOrderValue(draft.items).toLocaleString()}.`);
      return;

      b.id !== rescheduleId && b.status !== "cancelled" &&
      (b.invoice || "").trim().toLowerCase() === draft.invoice.trim().toLowerCase()

    if (dupe) {
      setInvoiceError(`There's already a delivery booked for invoice #${draft.invoice} (${isoToDMY(dupe.date)} ${dupe.time}, ${dupe.shop}).`);
      return;
    }
    if (!settings.apiUrl) { setSyncError("Connect a Google Sheet first."); return; }

      action: rescheduleId ? "update" : "create",

      date: draft.date, shop: draft.shop, pickup: draft.vehicle,
      time: draft.time, location: draft.location,
      invoice: draft.invoice, items: draft.items, zone: draft.zone,
    });

          </div>
        </div>
      )}

      {/* Change PIN modal — any signed-in user */}
      {changePinOpen && (
        <div className="fixed inset-0 bg-stone-900/50 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-lg w-full max-w-xs overflow-hidden relative">
            <button onClick={() => setChangePinOpen(false)} className="absolute top-4 right-4 text-stone-400 hover:text-stone-700 z-10"><X size={18} /></button>
            <div className="px-5 py-3" style={{ background: "linear-gradient(to bottom, #FAF8F1, #FFFFFF)", borderBottom: "1px solid #EFEAD9" }}>
              <span className="text-sm font-semibold text-stone-800" style={FONT_SERIF}>Change PIN</span>
            </div>
            <div className="p-5 space-y-3">
              <div>
                <label className="text-xs font-bold text-stone-500 uppercase tracking-wide">Current PIN</label>
                <input type="password" inputMode="numeric" value={currentPinInput} onChange={e => setCurrentPinInput(e.target.value)}
                  className="w-full border border-[#D9D2BC] rounded px-3 py-2 text-sm mt-1 bg-[#FAF8F1]" style={FONT_MONO} />
              </div>
              <div>
                <label className="text-xs font-bold text-stone-500 uppercase tracking-wide">New PIN</label>
                <input type="password" inputMode="numeric" value={newPinInput} onChange={e => setNewPinInput(e.target.value)}
                  className="w-full border border-[#D9D2BC] rounded px-3 py-2 text-sm mt-1 bg-[#FAF8F1]" style={FONT_MONO} />
              </div>
              <div>
                <label className="text-xs font-bold text-stone-500 uppercase tracking-wide">Confirm new PIN</label>
                <input type="password" inputMode="numeric" value={confirmPinInput} onChange={e => setConfirmPinInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && submitChangePin()}
                  className="w-full border border-[#D9D2BC] rounded px-3 py-2 text-sm mt-1 bg-[#FAF8F1]" style={FONT_MONO} />
              </div>
              {changePinError && <div className="text-xs text-rose-700 bg-rose-50 border border-rose-200 rounded p-2">{changePinError}</div>}
              <button onClick={submitChangePin} disabled={changePinBusy} className="w-full text-white text-sm font-semibold rounded py-2.5 disabled:opacity-50" style={{ background: "#126b39" }}>
                {changePinBusy ? "Saving…" : "Save new PIN"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Manage users modal — super admin only */}
      {usersOpen && (
        <div className="fixed inset-0 bg-stone-900/50 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-lg w-full max-w-lg overflow-hidden relative max-h-[92vh] flex flex-col">
            <button onClick={() => setUsersOpen(false)} className="absolute top-4 right-4 text-stone-400 hover:text-stone-700 z-10"><X size={18} /></button>
            <div className="px-5 py-3" style={{ background: "linear-gradient(to bottom, #FAF8F1, #FFFFFF)", borderBottom: "1px solid #EFEAD9" }}>
              <span className="text-sm font-semibold text-stone-800" style={FONT_SERIF}>Manage Users</span>
              <div className="text-xs text-stone-400 mt-0.5">Super admin only.</div>
            </div>
            <div className="p-5 overflow-y-auto space-y-5">

              <div>
                <div className="text-xs font-bold text-stone-500 uppercase tracking-wide mb-2">Add a user</div>
                <div className="grid gap-2 mb-2" style={{ gridTemplateColumns: "1fr 1fr" }}>
                  <input value={newUserName} onChange={e => setNewUserName(e.target.value)} placeholder="Name" className="border rounded px-2 py-1.5 text-sm bg-[#FAF8F1]" style={{ borderColor: "#D9D2BC" }} />
                  <input value={newUserRole} onChange={e => setNewUserRole(e.target.value)} placeholder="Role / job title" className="border rounded px-2 py-1.5 text-sm bg-[#FAF8F1]" style={{ borderColor: "#D9D2BC" }} />
                </div>
                <div className="grid gap-2" style={{ gridTemplateColumns: "1fr 100px auto" }}>
                  <select value={newUserAccess} onChange={e => setNewUserAccess(e.target.value)} className="border rounded px-2 py-1.5 text-sm bg-[#FAF8F1]" style={{ borderColor: "#D9D2BC" }}>
                    <option value="user">Regular user</option>
                    <option value="admin">Super admin</option>
                  </select>
                  <input value={newUserPin} onChange={e => setNewUserPin(e.target.value)} placeholder="PIN" inputMode="numeric" className="border rounded px-2 py-1.5 text-sm bg-[#FAF8F1]" style={{ borderColor: "#D9D2BC", ...FONT_MONO }} />
                  <button onClick={addUser} disabled={userMgmtBusy || !newUserName.trim() || newUserPin.length < 4}
                    className="px-3 py-1.5 rounded text-white text-xs font-semibold disabled:opacity-40" style={{ background: "#126b39" }}>Add</button>
                </div>
              </div>

              {userMgmtError && (
                <div className="flex items-start gap-2 text-xs text-rose-800 bg-rose-50 border border-rose-200 rounded p-2.5">
                  <AlertTriangle size={14} className="mt-0.5 shrink-0" /> {userMgmtError}
                </div>
              )}
              {userMgmtBusy && <div className="text-xs text-stone-500">Saving…</div>}

              <div>
                <div className="text-xs font-bold text-stone-500 uppercase tracking-wide mb-2">Current users ({userList.length})</div>
                {!usersLoaded ? (
                  <div className="text-xs text-stone-400">Loading…</div>
                ) : (
                  <div className="border border-[#E4DFD1] rounded-md overflow-y-auto" style={{ maxHeight: "280px" }}>
                    <table className="w-full text-xs">
                      <thead className="bg-[#FAF8F1] text-stone-500 uppercase sticky top-0">
                        <tr><th className="text-left px-2 py-1.5">Name</th><th className="text-left px-2 py-1.5">Role</th><th className="text-left px-2 py-1.5">Access</th><th></th></tr>
                      </thead>
                      <tbody>
                        {userList.map(u => (
                          <tr key={u.name} className="border-t border-[#EFEAD9]">
                            <td className="px-2 py-1.5">{u.name}</td>
                            <td className="px-2 py-1.5 text-stone-500">{u.role || "—"}</td>
                            <td className="px-2 py-1.5">
                              {u.shop && u.shop.trim().toLowerCase() === "superadmin"
                                ? <span className="text-xs font-semibold" style={{ color: "#126b39" }}>Super admin</span>
                                : <span className="text-xs text-stone-400">Regular</span>}
                            </td>
                            <td className="px-2 py-1.5 text-right">
                              {u.name !== session?.name && (
                                <button onClick={() => removeUser(u.name)} disabled={userMgmtBusy} className="text-xs font-semibold text-rose-600 hover:text-rose-700 disabled:opacity-40">Remove</button>
                              )}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>

            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
